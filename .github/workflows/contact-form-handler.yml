name: お問い合わせフォーム 通知処理

# フォームから自動作成された Issue が open されると起動する
on:
  issues:
    types: [opened]

jobs:
  handle-contact-form:
    # ラベル "contact-form" が付いた Issue のみ処理
    if: contains(github.event.issue.labels.*.name, 'contact-form')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: お問い合わせ受付コメントを追加
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ **お問い合わせを受け付けました。**\n\nこのIssueはWebサイトのお問い合わせフォームから自動作成されました。\n内容をご確認の上、お客様へご連絡ください。',
            });

      - name: Issue を自動クローズ（受付完了）
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });
