<!DOCTYPE html>
<html lang="ja">
<head>
  <script src="google-tag-manager.js"></script>
  <script src="google-tag-consent-popup.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サイトリンク | Nanndemoya</title>
  <meta name="description" content="Nanndemoya の各ページへのリンク一覧です。">
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    .description {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .link-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 14px;
    }

    .link-list a {
      display: block;
      text-decoration: none;
      color: var(--accent);
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 14px 16px;
      font-weight: 700;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .link-list a:hover {
      background: #dbeafe;
      color: var(--accent-hover);
      transform: translateY(-2px);
    }

    footer {
      margin-top: 28px;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
    }

    .back-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 18px;
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      box-shadow: 0 6px 20px rgba(37,99,235,0.3);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .back-top:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px;
      }

      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P56Q566B" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <main class="container">
    <section class="card">
      <h1>サイトリンク</h1>
      <p class="description">Nanndemoya の各ページへ移動できるリンク一覧です。</p>

      <ul class="link-list">
        <li><a href="https://9z2fqjckjv-bot.github.io/nanndemoya.github.io/">トップページ</a></li>
        <li><a href="https://9z2fqjckjv-bot.github.io/nanndemoya.github.io/information.html">連絡先</a></li>
        <li><a href="https://9z2fqjckjv-bot.github.io/nanndemoya.github.io/NCF.html">何でも屋基金</a></li>
        <li><a href="https://9z2fqjckjv-bot.github.io/nanndemoya.github.io/policy.html">「何でも屋」のポリシー</a></li>
        <li><a href="https://9z2fqjckjv-bot.github.io/nanndemoya.github.io/anytime_service_prices.html">利用料金表</a></li>
        <li><a href="https://9z2fqjckjv-bot.github.io/zuyasi.github.io/" target="_blank" rel="noopener noreferrer">zuyasiのWebサイト</a></li>
      </ul>

      <footer>
        <p>© 2026 Nanndemoya | Anyways, Anywhere, Anytimes</p>
      </footer>
    </section>
  </main>
  <a class="back-top" href="index.html">↑ トップに戻る</a>
</body>
</html>
