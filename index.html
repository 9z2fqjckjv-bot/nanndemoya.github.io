<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Personal Website</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      line-height: 1.6;
      background: #f5f7fb;
      color: #1f2937;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    section {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1, h2 {
      margin-top: 0;
    }

    ul {
      margin: 8px 0 0;
    }

    a {
      color: #2563eb;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>こんにちは、山田 太郎です</h1>
      <p>Web制作とフロントエンド開発を中心に活動しています。</p>
    </section>

    <section>
      <h2>プロフィール</h2>
      <p>使いやすく、見やすいWebサイトづくりを大切にしています。</p>
    </section>

    <section>
      <h2>スキル</h2>
      <ul>
        <li>HTML / CSS / JavaScript</li>
        <li>UI設計</li>
        <li>レスポンシブデザイン</li>
      </ul>
    </section>

    <section>
      <h2>連絡先</h2>
      <p><a href="mailto:hello@example.com">hello@example.com</a></p>
    </section>
  </main>
</body>
</html>
