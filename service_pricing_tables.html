<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>各サービスの料金体制</title>
<style>
    body {
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        background-color: #f9fbfa;
        color: #333;
        margin: 0;
        padding: 40px 20px;
    }
    .container {
        max-width: 1200px;
        margin: 0 auto;
        background: #fff;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    h1 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 50px;
        font-size: 2em;
    }
    h2 {
        color: #2980b9;
        border-left: 5px solid #2980b9;
        padding-left: 15px;
        margin-top: 50px;
        margin-bottom: 20px;
        font-size: 1.4em;
    }
    .table-container {
        width: 100%;
        overflow-x: auto;
        margin-bottom: 40px;
    }
    table {
        border-collapse: collapse;
        min-width: 100%;
        background-color: #fff;
        font-size: 14px;
        line-height: 1.4;
    }
    th, td {
        border: 1px solid #e0e6ed;
        padding: 10px 15px;
        white-space: nowrap;
    }
    th {
        background-color: #f1f5f8;
        color: #2c3e50;
        font-weight: bold;
        text-align: left;
    }
    tr:nth-child(even) {
        background-color: #fafbfc;
    }
    tr:hover {
        background-color: #f0f7ff;
    }
    /* Simple styling to hide empty cells cleanly */
    td.empty {
        border: none;
        background: transparent;
    }
</style>
</head>
<body>
<div class="container">
<h1>各サービスの料金体制</h1>
<p>CSVファイルが見つかりませんでした。</p>
</div>
</body>
</html>
